<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Search Generator</title>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-icon-180x180.png">
  <link rel="manifest" href="favicon/manifest.json">

  <!-- Open Graph -->
  <meta property="og:title" content="Word Search Generator">
  <meta property="og:description" content="Create, print, share, and solve custom word search puzzles — no sign-up required.">
  <meta property="og:url" content="https://wordsearch.mjt.pub">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container">
    <h1>Word Search Generator</h1>

    <form id="puzzle-form" class="puzzle-form">
      <div class="form-group">
        <label for="puzzle-title">Title <span class="optional">(optional)</span></label>
        <input type="text" id="puzzle-title" placeholder="My Word Search">
      </div>

      <div class="form-group">
        <label for="word-input">Words <span class="hint">(one per line)</span></label>
        <textarea id="word-input" rows="10" placeholder="Enter words here&#10;one per line"></textarea>
      </div>

      <button type="submit" class="btn-generate">Generate</button>

      <div id="error-message" class="error-message" hidden></div>
    </form>

    <section id="puzzle-output" class="puzzle-output" hidden>
      <!-- Grid and word bank rendered here by JS -->
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
